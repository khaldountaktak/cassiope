services:
  postgres:
    image: postgres:15.7
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend

  zipkin:
    image: openzipkin/zipkin:3.3
    container_name: zipkin
    restart: unless-stopped
    ports:
      - 9411:9411
    networks:
      - backend

  configserver:
    build:
      context: ./configserver
      dockerfile: Dockerfile
    container_name: configserver
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: native
      ENCRYPT_KEY: ${ENCRYPT_KEY}
    volumes:
      - ./eazybytes-config:/config-repo:z
    ports:
      - 8071:8071
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8071/actuator/health | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend

  eurekaserver:
    build:
      context: ./eurekaserver
      dockerfile: Dockerfile
    container_name: eurekaserver
    restart: unless-stopped
    depends_on:
      configserver:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: default
      SPRING_CONFIG_IMPORT: optional:configserver:http://configserver:8071/
      SERVER_PORT: 8761
      SERVER_ADDRESS: 0.0.0.0
    ports:
      - 8761:8761
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8761/actuator/health | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend

  accounts:
    build:
      context: ./accounts
      dockerfile: Dockerfile
    container_name: accounts
    restart: unless-stopped
    depends_on:
      configserver:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: accounts
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CONFIG_IMPORT: optional:configserver:http://configserver:8071/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/eazybank_accounts
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: 8080
    networks:
      - backend

  cards:
    build:
      context: ./cards
      dockerfile: Dockerfile
    container_name: cards
    restart: unless-stopped
    depends_on:
      configserver:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: cards
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CONFIG_IMPORT: optional:configserver:http://configserver:8071/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/eazybank_cards
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: 9000
    networks:
      - backend

  loans:
    build:
      context: ./loans
      dockerfile: Dockerfile
    container_name: loans
    restart: unless-stopped
    depends_on:
      configserver:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: loans
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CONFIG_IMPORT: optional:configserver:http://configserver:8071/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/eazybank_loans
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: 9001
    networks:
      - backend

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - 80:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
    depends_on:
      - accounts
      - cards
      - loans
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data: {}